# Alembic configuration for the backend API.
#
# purpose:
# - define where the migration scripts live
# - let Alembic boot in this package cleanly
# - keep DB URL injection in env.py, not duplicated here

[alembic]
# Point Alembic at the local migration package.
script_location = alembic

# This keeps generated revision filenames predictable.
# We include year/month/day/hour/minute/second plus the slug.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Keep the path simple for now.
prepend_sys_path = .

# SQLAlchemy URL is intentionally NOT hard-coded here.
# env.py will inject the URL from app.config.settings.
sqlalchemy.url = driver://unused

[post_write_hooks]
# No post-write hooks yet.
# Ruff/formatting can be added later if wanted.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s